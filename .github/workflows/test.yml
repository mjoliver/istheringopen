name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  proxy-tests:
    name: Proxy TTL tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run proxy tests
        run: node proxy/test_ttl.js
